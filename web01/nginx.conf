server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # Try to serve file, then directory (index.html), then 404
        try_files $uri $uri/ $uri.html /404.html =404;
    }

    # Custom handling for the budget tool to ensure it works with/without slash
    location /presupuestador {
        try_files $uri $uri/ /presupuestador/index.html /presupuestador.html =404;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Cache Control for assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|avif|webp)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }
}
