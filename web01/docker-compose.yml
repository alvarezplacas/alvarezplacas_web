services:
  web_alvarezplacas:
    build: .
    image: node:22-alpine
    container_name: alvarezplacas_web
    restart: unless-stopped
    ports:
      - "4325:4321"
    environment:
      - DATABASE_URL=postgresql://alvarez_admin:AlvarezAdmin2026@alvarezplacas_db:5432/alvarezplacas
      - DIRECTUS_URL=http://alvarezplacas_directus:8055
      - DIRECTUS_ADMIN_EMAIL=admin@alvarezplacas.com.ar
      - DIRECTUS_ADMIN_PASSWORD=JavierMix2026!
      - NODE_ENV=production
    depends_on:
      alvarezplacas_db:
        condition: service_healthy
      alvarezplacas_directus:
        condition: service_started
    networks:
      - javiermix_network
      - alvarez_internal

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: alvarezplacas_files
    restart: unless-stopped
    ports:
      - "4326:80"
    volumes:
      - ./archivos_alvarezplacas:/srv
      - ./filebrowser.db:/database.db
    networks:
      - javiermix_network

  alvarezplacas_db:
    image: postgres:16-alpine
    container_name: alvarezplacas_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=alvarez_admin
      - POSTGRES_PASSWORD=AlvarezAdmin2026
      - POSTGRES_DB=alvarezplacas
    ports:
      - "5433:5432"
    volumes:
      - alvarez_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alvarez_admin -d alvarezplacas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alvarez_internal

  alvarezplacas_directus:
    image: directus/directus:11.1.0
    container_name: alvarezplacas_directus
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      KEY: "alvarez-placas-secret-key-2026"
      SECRET: "alvarez-placas-secret-token-2026"
      DB_CLIENT: "pg"
      DB_HOST: "alvarezplacas_db"
      DB_PORT: "5432"
      DB_DATABASE: "alvarezplacas"
      DB_USER: "alvarez_admin"
      DB_PASSWORD: "AlvarezAdmin2026"
      ADMIN_EMAIL: "admin@alvarezplacas.com.ar"
      ADMIN_PASSWORD: "JavierMix2026!"
      CACHE_ENABLED: "true"
      CACHE_STORE: "memory"
      STORAGE_LOCATIONS: "local"
      STORAGE_LOCAL_ROOT: "./uploads"
    networks:
      - javiermix_network
      - alvarez_internal
    depends_on:
      alvarezplacas_db:
        condition: service_healthy

networks:
  javiermix_network:
    external: true
  alvarez_internal:
    driver: bridge

volumes:
  alvarez_data_v2:
