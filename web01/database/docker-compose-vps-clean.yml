# Docker Compose - Alvarez Placas Backend (Clean Install)
# Location: /opt/alvarezplacas/directus/docker-compose.yml
# Propósito: Instalación aislada de Directus + PostgreSQL 15.

services:
  alvarez_db:
    image: postgres:15-alpine
    container_name: alvarez-db-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: alvarez_admin
      POSTGRES_PASSWORD: AlvarezAdmin2026
      POSTGRES_DB: alvarezplacas
    volumes:
      - /opt/alvarezplacas/database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alvarez_admin -d alvarezplacas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alvarez_internal

  alvarez_directus:
    image: directus/directus:11.1.0
    container_name: alvarez-backend-directus
    restart: unless-stopped
    ports:
      - "8056:8055" # Puerto único para no chocar con javiermix.ar
    environment:
      KEY: "alvarez-placas-secret-key-2026"
      SECRET: "alvarez-placas-secret-token-2026"
      DB_CLIENT: "pg"
      DB_HOST: "alvarez_db"
      DB_PORT: "5432"
      DB_DATABASE: "alvarezplacas"
      DB_USER: "alvarez_admin"
      DB_PASSWORD: "AlvarezAdmin2026"
      ADMIN_EMAIL: "admin@alvarezplacas.com.ar"
      ADMIN_PASSWORD: "JavierMix2026!"
      CACHE_ENABLED: "true"
      CACHE_STORE: "memory"
      STORAGE_LOCATIONS: "local"
      STORAGE_LOCAL_ROOT: "/opt/alvarezplacas/uploads"
    depends_on:
      alvarez_db:
        condition: service_healthy
    networks:
      - alvarez_internal
      - javiermix_network # Para conexión con Nginx Proxy Manager

networks:
  alvarez_internal:
    driver: bridge
  javiermix_network:
    external: true
