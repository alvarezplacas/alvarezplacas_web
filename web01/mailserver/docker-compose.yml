#      - mailserver
#    networks:
#      - default
#      - npm_network

  snappymail:
    image: ghcr.io/the-djmaze/snappymail:latest
    container_name: snappymail
    restart: always
    environment:
      - SNAPPYMAIL_ADMIN_USER=admin
      - SNAPPYMAIL_ADMIN_PASSWORD=12345
    ports:
      - "8080:8888"
    volumes:
      - ./snappymail-data:/var/lib/snappymail
    depends_on:
      - mailserver
    networks:
      - default
      - javiermix_network

volumes:
  roundcube_db:
  roundcube_logs:

networks:
  default:
  javiermix_network:
    external: true
