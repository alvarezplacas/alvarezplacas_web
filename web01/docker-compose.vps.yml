# Consolidated Production Config for Alvarez Placas
services:
  alvarezplacas_db:
    image: postgres:16-alpine
    container_name: alvarezplacas_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=alvarez_admin
      - POSTGRES_PASSWORD=AlvarezAdmin2026
      - POSTGRES_DB=alvarezplacas
    ports:
      - "5433:5432"
    volumes:
      - web01_alvarez_data_v16:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alvarez_admin -d alvarezplacas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alvarez_prod_private_net

  alvarezplacas_directus:
    image: directus/directus:11.1.0
    container_name: alvarezplacas_directus
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      KEY: "alvarez-api-token-v16-2026"
      SECRET: "alvarez-placas-secret-token-2026"
      DB_CLIENT: "pg"
      DB_HOST: "alvarezplacas_db"
      DB_PORT: "5432"
      DB_DATABASE: "alvarezplacas"
      DB_USER: "alvarez_admin"
      DB_PASSWORD: "AlvarezAdmin2026"
      # Configuración de admin
      ADMIN_EMAIL: "admin@alvarezplacas.com.ar"
      ADMIN_PASSWORD: "JavierMix2026!"
      
      # 🚀 Mejores Amigos: Búsqueda y Almacenamiento Profesional
      SEARCH_ENABLED: "true"
      SEARCH_STORE: "meilisearch"
      SEARCH_MEILISEARCH_HOST: "http://alvarezplacas_meili:7700"
      SEARCH_MEILISEARCH_KEY: "AlvarezMeili2026!"
      
      STORAGE_LOCATIONS: "s3"
      STORAGE_S3_DRIVER: "s3"
      STORAGE_S3_KEY: "AlvarezMinioUser2026"
      STORAGE_S3_SECRET: "AlvarezMinioSecret2026!"
      STORAGE_S3_BUCKET: "alvarez-assets"
      STORAGE_S3_ENDPOINT: "http://alvarezplacas_minio:9000"
      STORAGE_S3_S3_FORCE_PATH_STYLE: "true"
      
      CACHE_ENABLED: "true"
      CACHE_STORE: "memory"
      
      # Email SMTP Config
      EMAIL_FROM: "info@alvarezplacas.com.ar"
      EMAIL_TRANSPORT: "smtp"
      EMAIL_SMTP_HOST: "mailserver"
      EMAIL_SMTP_PORT: "587"
      EMAIL_SMTP_USER: "info@alvarezplacas.com.ar"
      EMAIL_SMTP_PASSWORD: "Tecno/315"
      EMAIL_SMTP_SECURE: "false"
      EMAIL_SMTP_IGNORE_TLS: "false"
      # Seguridad y CORS para el Frontend
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://alvarezplacas.com.ar,https://www.alvarezplacas.com.ar"
      CORS_METHODS: "GET,POST,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      CORS_EXPOSED_HEADERS: "Content-Range"
      CORS_CREDENTIALS: "true"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8055/server/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - javiermix_network          # El "cable" al proxy (Para admin.alvarezplacas.com.ar)
      - alvarez_prod_private_net   # El "cable" interno (DB, Search, Storage)

    depends_on:
      alvarezplacas_db:
        condition: service_healthy

  alvarezplacas_meili:
    image: getmeili/meilisearch:v1.12
    container_name: alvarezplacas_meili
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=AlvarezMeili2026!
      - MEILI_NO_ANALYTICS=true
    volumes:
      - web01_alvarez_meili_data:/meili_data
    networks:
      - alvarez_prod_private_net

  alvarezplacas_minio:
    image: minio/minio:latest
    container_name: alvarezplacas_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=AlvarezMinioUser2026
      - MINIO_ROOT_PASSWORD=AlvarezMinioSecret2026!
      - MINIO_BROWSER_REDIRECT_URL=https://minio.alvarezplacas.com.ar
    volumes:
      - web01_alvarez_minio_data:/data
    networks:
      - javiermix_network          # Para la consola minio.alvarezplacas.com.ar
      - alvarez_prod_private_net   # Para Directus as S3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  alvarezplacas_web:
    image: node:22-alpine
    container_name: alvarezplacas_web
    working_dir: /app
    volumes:
      - /opt/alvarez_v16/web01/site/web01:/app
      - /opt/alvarezplacas/placas:/app/public/Placas
    ports:
      - "4321:4321"
    command: sh -c "npm install && npm run build && node ./dist/server/entry.mjs"
    environment:
      - PUBLIC_DIRECTUS_URL=https://admin.alvarezplacas.com.ar
      - DIRECTUS_URL_INTERNAL=http://alvarezplacas_directus:8055
      - DATABASE_URL=postgresql://alvarez_admin:AlvarezAdmin2026@alvarezplacas_db:5432/alvarezplacas
      - HOST=0.0.0.0
      - PORT=4321
      - NODE_ENV=production
    networks:
      - javiermix_network          # El "cable" al proxy
      - alvarez_prod_private_net   # El "cable" interno
    restart: always
    depends_on:
      alvarezplacas_directus:
        condition: service_healthy

networks:
  javiermix_network:
    external: true
  alvarez_prod_private_net:        # Red aislada sugerida por el usuario
    driver: bridge

volumes:
  web01_alvarez_data_v16:
    external: true
    name: web01_alvarez_data_v16
  web01_alvarez_meili_data:
  web01_alvarez_minio_data:
