services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: alvarezplacas_files
    ports:
      - "8081:80"
    volumes:
      - /home/ubuntu/alvarezplacas_web/web01:/srv
      - /opt/alvarezplacas/filebrowser.db:/database.db
    networks:
      - javiermix_network
    restart: always

  web:
    image: node:22-alpine
    container_name: alvarezplacas_web
    working_dir: /app
    volumes:
      - /home/ubuntu/alvarezplacas_web/web01:/app
      - /opt/alvarezplacas/placas:/app/public/Placas
    # Build + run SSR standalone (modo producción correcto para Astro node adapter)
    command: sh -c "npm run build && node ./dist/server/entry.mjs"
    environment:
      - PUBLIC_DIRECTUS_URL=https://admin.alvarezplacas.com.ar
      - DIRECTUS_URL_INTERNAL=http://alvarezplacas_directus:8055
      - HOST=0.0.0.0
      - PORT=4321
      - NODE_ENV=production
    networks:
      - javiermix_network
      - web01_alvarez_internal
    restart: always

networks:
  javiermix_network:
    external: true
  web01_alvarez_internal:
    external: true
