services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: alvarezplacas_files
    ports:
      - "8081:80"
    volumes:
      - /home/ubuntu/alvarezplacas_web/web01:/srv
      - /opt/alvarezplacas/filebrowser.db:/database.db
    networks:
      - javiermix_network
    restart: always

  web:
    image: node:22-alpine
    container_name: alvarezplacas_web
    working_dir: /app
    volumes:
      - /home/ubuntu/alvarezplacas_web/web01:/app
      - /opt/alvarezplacas/placas:/app/public/Placas
    # Removed npm install to prevent 504 timeouts on startup
    command: sh -c "npm run dev -- --host 0.0.0.0"
    environment:
      - DIRECTUS_URL_INTERNAL=http://alvarezplacas_directus:8055
      - NODE_ENV=production
    networks:
      - javiermix_network
    restart: always

networks:
  javiermix_network:
    external: true
