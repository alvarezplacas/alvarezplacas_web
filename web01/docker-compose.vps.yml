services:
  alvarezplacas_db:
    image: postgres:16-alpine
    container_name: alvarezplacas_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=alvarez_admin
      - POSTGRES_PASSWORD=AlvarezAdmin2026
      - POSTGRES_DB=alvarezplacas
    ports:
      - "5433:5432"
    volumes:
      - web01_alvarez_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alvarez_admin -d alvarezplacas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alvarez_prod_private_net

  alvarezplacas_directus:
    image: directus/directus:11.1.0
    container_name: alvarezplacas_directus
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      KEY: "alvarez-placas-secret-key-2026"
      SECRET: "alvarez-placas-secret-token-2026"
      DB_CLIENT: "pg"
      DB_HOST: "alvarezplacas_db"
      DB_PORT: "5432"
      DB_DATABASE: "alvarezplacas"
      DB_USER: "alvarez_admin"
      DB_PASSWORD: "AlvarezAdmin2026"
      # Configuración de admin
      ADMIN_EMAIL: "admin@alvarezplacas.com.ar"
      ADMIN_PASSWORD: "JavierMix2026!"
      # Performance y Almacenamiento
      CACHE_ENABLED: "true"
      CACHE_STORE: "memory"
      STORAGE_LOCATIONS: "local"
      STORAGE_LOCAL_ROOT: "/home/ubuntu/prod/alvarezplacas_web/web01/uploads"
    networks:
      - javiermix_network          # El "cable" al proxy
      - alvarez_prod_private_net   # El "cable" a la DB
    depends_on:
      alvarezplacas_db:
        condition: service_healthy

  web:
    image: node:22-alpine
    container_name: alvarezplacas_web
    working_dir: /app
    volumes:
      - /home/ubuntu/prod/alvarezplacas_web/web01:/app
      - /opt/alvarezplacas/placas:/app/public/Placas
    command: sh -c "npm run build && node ./dist/server/entry.mjs"
    environment:
      - PUBLIC_DIRECTUS_URL=https://admin.alvarezplacas.com.ar
      - DIRECTUS_URL_INTERNAL=http://alvarezplacas_directus:8055
      - DATABASE_URL=postgresql://alvarez_admin:AlvarezAdmin2026@alvarezplacas_db:5432/alvarezplacas
      - HOST=0.0.0.0
      - PORT=4321
      - NODE_ENV=production
    networks:
      - javiermix_network          # El "cable" al proxy
      - alvarez_prod_private_net   # El "cable" interno
    restart: always
    depends_on:
      alvarezplacas_db:
        condition: service_healthy
      alvarezplacas_directus:
        condition: service_started

networks:
  javiermix_network:
    external: true
  alvarez_prod_private_net:        # Red aislada sugerida por el usuario
    driver: bridge

volumes:
  web01_alvarez_data_v2:
    external: true
    name: web01_alvarez_data_v2
                 # Mantenemos el volumen global para no perder datos
