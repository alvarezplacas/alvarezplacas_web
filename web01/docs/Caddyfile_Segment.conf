# 🛡️ Segmento de Configuración Caddy para Alvarez Placas v16

# Web Principal
alvarezplacas.com.ar, www.alvarezplacas.com.ar {
    reverse_proxy alvarezplacas_web:4321
}

# Panel de Administración Directus
admin.alvarezplacas.com.ar {
    reverse_proxy alvarezplacas_directus:8055
}

# Consola de Almacenamiento MinIO
minio.alvarezplacas.com.ar {
    reverse_proxy alvarezplacas_minio:9001
}

# ⚠️ NOTA DE AISLAMIENTO:
# Estos bloques deben coexistir en el Caddyfile global sin interferir con javiermix.ar.
# Caddy gestionará los certificados SSL automáticamente para cada dominio.
