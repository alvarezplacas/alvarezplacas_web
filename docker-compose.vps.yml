services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: alvarezplacas_files
    ports:
      - "8081:80"
    volumes:
      - /home/ubuntu/alvarezplacas_web:/srv
      - /opt/alvarezplacas/filebrowser.db:/database.db
    networks:
      - javiermix_network
    restart: always

  web:
    image: node:22-alpine
    container_name: alvarezplacas_web
    working_dir: /app
    volumes:
      - /home/ubuntu/alvarezplacas_web:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - DATABASE_URL=postgresql://alvarez_admin:AlvarezAdmin2026@alvarezplacas_db:5432/alvarezplacas
    networks:
      - javiermix_network
    restart: always

  alvarez_db:
    image: postgres:15
    container_name: alvarezplacas_db
    restart: always
    environment:
      - POSTGRES_USER=alvarez_admin
      - POSTGRES_PASSWORD=AlvarezAdmin2026
      - POSTGRES_DB=alvarezplacas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - javiermix_network

  directus:
    image: directus/directus:latest
    container_name: alvarezplacas_directus
    ports:
      - "8055:8055"
    environment:
      KEY: "alvarez-placas-secret-key-2026"
      SECRET: "alvarez-placas-secret-token-2026"
      DB_CLIENT: "pg"
      DB_HOST: "alvarezplacas_db"
      DB_PORT: "5432"
      DB_DATABASE: "alvarezplacas"
      DB_USER: "alvarez_admin"
      DB_PASSWORD: "AlvarezAdmin2026"
      # Admin Credentials para el primer login
      ADMIN_EMAIL: "admin@alvarezplacas.com.ar"
      ADMIN_PASSWORD: "JavierMix2026!"
    networks:
      - javiermix_network
    restart: always

networks:
  javiermix_network:
    external: true

volumes:
  postgres_data:
