name: Deploy to VPS
# Triggering run after secrets configuration

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 144.217.163.13
          username: root
          password: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            echo "Starting deployment for Alvarez Placas..."
            echo "Directorio actual antes del despliegue:"
            pwd
            mkdir -p /home/ubuntu/alvarezplacas_web
            cd /home/ubuntu/alvarezplacas_web
            echo "Directorio de trabajo:"
            pwd
            if [ ! -d .git ]; then
              echo "Cloning repository for the first time..."
              git clone https://github.com/alvarezplacas/alvarezplacas_web.git .
            else
              echo "Updating existing repository..."
              git remote set-url origin https://github.com/alvarezplacas/alvarezplacas_web.git
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            fi
            echo "Performing deep cleaning of FileBrowser..."
            docker stop alvarezplacas_files || true
            docker rm alvarezplacas_files || true
            rm -f filebrowser.db
            # No hacemos touch, dejamos que FileBrowser lo cree para evitar archivos vacíos corruptos
            
            echo "Rebuilding and restarting containers..."
            docker compose -f docker-compose.yml up -d --build
            
            echo "Waiting for all services to stabilize (45s)..."
            sleep 45
            
            echo "Checking Database connection from web container..."
            docker exec alvarezplacas_web curl -s http://localhost/api/settings || echo "API check failed, but continuing..."
            
            echo "Injecting FileBrowser credentials..."
            # Asegurarnos de usar la ruta completa al binario y el archivo de db correcto
            docker exec alvarezplacas_files /filebrowser users add "alvarezjavierh@gmail.com" "Tecno121212" --perm.admin || \
            docker exec alvarezplacas_files /filebrowser users update 1 --username "alvarezjavierh@gmail.com" --password "Tecno121212"
            
            docker exec alvarezplacas_files /filebrowser users add "javier" "Tecno121212" --perm.admin || true
            
            echo "Final user list in FileBrowser:"
            docker exec alvarezplacas_files /filebrowser users ls
            
            echo "Docker containers status:"
            docker ps
            
            echo "Inspect running containers:"
            echo "Inspect images:"
            docker images | grep alvarez
            echo "Deployment finished successfully!"
