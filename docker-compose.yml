services:
  web_alvarezplacas:
    build: .
    container_name: alvarezplacas_web
    restart: always
    ports:
      - "4322:80"
    networks:
      - javiermix_network

  db:
    image: postgres:16-alpine
    container_name: alvarezplacas_db
    environment:
      POSTGRES_USER: alvarez_admin
      POSTGRES_PASSWORD: alvarez_password
      POSTGRES_DB: alvarezplacas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/infrastructure/db-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - javiermix_network

networks:
  javiermix_network:
    external: true

volumes:
  postgres_data:
