services:
  web_alvarezplacas:
    build: .
    container_name: alvarezplacas_web
    restart: always
    ports:
      - "4322:80"
    networks:
      - alvarez_internal
      - javiermix_network
    volumes:
      - ./archivos_alvarezplacas:/usr/share/nginx/html/images/catalog
    environment:
      - DATABASE_URL=postgresql://alvarez_admin:AlvarezAdmin2026@db:5432/alvarezplacas
      - NODE_ENV=production

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: alvarezplacas_files
    restart: always
    # No public port anymore, proxied by nginx on port 80
    # ports:
    #   - "4323:80"
    volumes:
      - ./archivos_alvarezplacas:/srv
      - ./filebrowser.db:/database.db
    command: [ "--database", "/database.db", "--port", "80", "--address", "0.0.0.0" ]
    networks:
      - alvarez_internal
      - javiermix_network

  db:
    image: postgres:16-alpine
    container_name: alvarezplacas_db
    environment:
      POSTGRES_USER: alvarez_admin
      POSTGRES_PASSWORD: AlvarezAdmin2026
      POSTGRES_DB: alvarezplacas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/db-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alvarez_internal
      - javiermix_network

networks:
  alvarez_internal:
    driver: bridge
  javiermix_network:
    external: true

volumes:
  postgres_data:
