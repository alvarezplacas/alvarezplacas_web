services:
  web_alvarezplacas:
    build: .
    container_name: alvarezplacas_web
    restart: always
    ports:
      - "4322:80"
    networks:
      - javiermix_network
    volumes:
      - ./archivos_alvarezplacas:/usr/share/nginx/html/images/catalog
    environment:
      - DATABASE_URL=postgresql://alvarez_admin:JavierMix2026!@db:5432/alvarezplacas
      - NODE_ENV=production

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: alvarezplacas_files
    restart: always
    ports:
      - "8083:80"
    volumes:
      - ./archivos_alvarezplacas:/srv
      - ./filebrowser.db:/database.db
    # Usar flags estándar para asegurar que cargue la DB y el puerto 80 interno
    command: [ "--database", "/database.db", "--port", "80" ]
    networks:
      - javiermix_network

  db:
    image: postgres:16-alpine
    container_name: alvarezplacas_db
    environment:
      POSTGRES_USER: alvarez_admin
      POSTGRES_PASSWORD: JavierMix2026!
      POSTGRES_DB: alvarezplacas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/infrastructure/db-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - javiermix_network

networks:
  javiermix_network:
    external: true

volumes:
  postgres_data:
